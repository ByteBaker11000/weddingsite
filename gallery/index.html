<!DOCTYPE html>

    <nav>

            <li><a href="/about/">About</a></li>
            <li><a href="/contact/">Contact</a></li>
        </ul>
    </nav>
</header>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get("token");

    const secretToken = "L0v31siNtHeAir";

    if (token !== secretToken) {
        alert("Kein Zugriff erlaubt! Bitte den QR-Code oder den korrekten Link verwenden.");
        window.location.href = "https://google.com";
    } else {
        document.querySelectorAll('a').forEach(link => {
            const href = new URL(link.href, window.location.origin);
            href.searchParams.set('token', token);
            link.href = href.toString();
        });
    }
</script>

    <main>
        <h1 id="galerie">Galerie</h1>

<p>Hier findet ihr Bilder von unserem besonderen Tag! 🎉</p>

<div class="gallery">

    <img src="/assets/images/bild2.jpg" alt="Bild 2" />
    <img src="/assets/images/bild3.jpg" alt="Bild 3" />
</div>

    </main>

</footer>

</body>
